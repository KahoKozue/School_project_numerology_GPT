{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命理gpt</title>

    <!-- swiper css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css" />

    <!-- box icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <!-- custom css -->
    <link rel="stylesheet" href="{% static 'css/we.css' %}">
</head>

<body onload="init()">
    <!-- header design -->
<header class="header">
    <a href="/index" class="logo">命理GPT.</a>

    <nav class="navbar">
        <a href="/index" class="active">首頁</a>        
        <a href="/aichat2">AI算命師</a>
        <a href="/year">流年運勢</a>
        <a href="/day">每日運勢</a>
        <a href="/book">教育資源</a>
        <a href="/index#about">關於我們</a>
        <a href="/we">聯絡我們</a>
            {% if user.is_authenticated %}
            <a href="/aboutme/"> {{ user.get_username }}</a>
            <a href="/logout/">登出</a>
            {% else %}
            <a href="/login/">登入</a>
        {% endif %}
    </nav>

    <div class="bx bx-moon" id="darkMode-icon"></div>

    <div class="bx bx-menu" id="menu-icon"></div>
</header>

    <!-- contact section design -->
    <section class="contact" id="contact">
        <h2 class="heading"> <span>聯絡我們!</span></h2>

        <form enctype="text/plain" accept-charset="utf-8">
            <div class="input-box">
                <input id="nameText" type="text" name="Name"  value size="60" placeholder="姓名(name)" required>
                <input type="email" placeholder="Email" value size="60" name="Email" id="emailText" required >
            </div>
            <div class="input-box">
                <input type="tel" placeholder="電話(phone)" value size="60" name="Phone" id="telText" aria-invalid="false">
                <input type="text" placeholder="主旨" name="Subject"  value size="60" id="subText" aria-invalid="false">
            </div>
            <textarea name="" id="bodyText" name="你的訊息" cols="40" rows="10" placeholder="Your Message" aria-required="true" aria-invalid="false"></textarea>
            <div>
                <input type="button" value="送出訊息" onclick="submitHandler();" class="btn">
            <a id="mailTo"></a>
            </div>
        </form>
    </section>



     <!-- scroll reveal -->
     <script src="https://unpkg.com/scrollreveal"></script>

     <!-- swiper js -->
     <script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
     <script>
        //宣告預設表單內容為空 （你想要的話也可以加東西）
            var initSubject='',initBody='';
         
            //按下傳送按鈕後執行
            function submitHandler(){
                var to = "contact@example.com";//寫死的傳送對象 就是公司的信箱 不會顯示在網頁上
                var name = nameText.value;//讀取ID為 nameTextuser 物件中的值
                var email = emailText.value;
                var tel = telText.value;
                var subject = subText.value;
        //把user填的資料都塞到 mail body 中
                var body = ""+bodyText.value+'%0A%0A%0A';//%0A是換行 換了三行
                    body += "From："+nameText.value+'%0A';
                    body += "Email："+emailText.value+'%0A';
                    body += "Tel："+telText.value;
        //傳送的主要程式碼
                mailTo.href="mailto:"+to+"?subject="+subject+"&body="+body;
                mailTo.click();
            }
        //在body onload
            function init(){
                subText.value=initSubject;
                toText.value=initTo;
                bodyText.value=initBody;
            }
        </script>
    
     
     <!-- custom js -->
     <script src="{% static 'js/we.js'%}"></script>
</body>

</html>
