{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命理gpt</title>

    <!-- swiper css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css" />

    <!-- box icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <!-- custom css -->
    <link rel="stylesheet" href="{% static 'css/forget.css'%}">
</head>

<body>

 <!-- header design -->
    <header class="header">
        <a href="/index" class="logo">命理GPT.</a>

        <nav class="navbar">
          <a href="/index" class="active">首頁</a>        
          <a href="/aichat2">AI算命師</a>
          <a href="/year">流年運勢</a>
          <a href="/day">每日運勢</a>
          <a href="/book">教育資源</a>
          <a href="/index/#about">關於我們</a>
          <a href="/we">聯絡我們</a>
            {% if user.is_authenticated %}
            <a href="/aboutme/"> {{ user.get_username }}</a>
            <a href="/logout/">登出</a>
            {% else %}
            <a href="/login/">登入</a>
        {% endif %}
        </nav>

        <div class="bx bx-moon" id="darkMode-icon"></div>

        <div class="bx bx-menu" id="menu-icon"></div>
    </header>
    <div class="wrapper">
        <div class="container">
          <div class="col-left">
            <div class="login-text">
              <h2>忘記密碼了嗎?</h2>
              <p>沒關係!.<br>趕緊重新設定一個吧.</p>
              
            </div>
          </div>
          <div class="col-right">
            <div class="login-form">
              <h2>重設密碼</h2>
              <form>
                <p>
                  <label>使用者電子信箱<span>*</span></label>
                  <input type="text" placeholder="Email" required>
                </p>
                <p>
                  <label>新密碼<span>*</span></label>
                  <input type="password" placeholder="Password" required maxlength="15">
                </p>
                <p>
                    <label>確認新密碼<span>*</span></label>
                    <input type="password" placeholder="Password" required maxlength="15">
                  </p>
                <p>
                  <input type="submit" value="創建" />
                </p>
              </form>
            </div>
          </div>
        </div>
        
      </div>
   <!-- scroll reveal -->
    <script src="https://unpkg.com/scrollreveal"></script>

    <!-- swiper js -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>

    <!-- custom js -->
    <script src="{% static 'js/forget.js'%}"></script>
</body>

</html>
