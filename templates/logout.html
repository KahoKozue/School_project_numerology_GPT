{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>登入</title>
    <!-- swiper css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css" />

    <!-- box icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <!-- custom css -->
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>

<body>
    <!-- header design -->
    <header class="header">
        <a href="/index" class="logo">命理GPT.</a>

        <nav class="navbar">
            <a href="/index" class="active">首頁</a>        
            <a href="/aichat2">AI算命師</a>
            <a href="/year">流年運勢</a>
            <a href="/day">每日運勢</a>
            <a href="/book">教育資源</a>
            <a href="/index/#about">關於我們</a>
            <a href="/we">聯絡我們</a>
            {% if request.user.is_authenticated %}
            <a href="/logout">登出</a>
            {% else %}
            <a href="/login">登入</a>
        {% endif %}
        </nav>

        <div class="bx bx-moon" id="darkMode-icon"></div>

        <div class="bx bx-menu" id="menu-icon"></div>
    </header>
     <br>
     <br>
     <br>
     <br>
     <br>
     <br>
     <br>
     <br>
     <br>
     <br>
     <br>
     <br>
     <br>

        <div class="container" id="container">
            <div class="form-container sign-up">
                <form>
                    <h1>創建新帳號</h1>
                    <span></span>
                    <input type="text" placeholder="Name" required maxlength="10">
                    <input type="email" placeholder="Email" required>
                    <input type="password" placeholder="Password" required maxlength="15" >
                    <button>創建</button>
                </form>
            </div>
            <div class="form-container sign-in">
                <form action="" method="post">
                    <h1>登入</h1>
                    <span></span>
                    <input type="email" placeholder="Email" required>
                    <input type="password" placeholder="Password" required maxlength="15">
                    <a href="/forget">忘記密碼?</a>
                    <button>登入</button>
                </form>
                
            </div>
            
            <div class="toggle-container">
                <div class="toggle">
                    <div class="toggle-panel toggle-left">
                        <h1>歡迎回來!</h1>
                        <p>快來使用我吧!</p>
                        <button class="hidden" id="login">登入 required</button>
                    </div>
                    <div class="toggle-panel toggle-right">
                        <h1>嗨!歡迎回來!</h1>
                        <p>開始使用神奇的AI算命師服務吧!</p>
                        <p>沒帳號嗎? 點擊下方按鈕創建新帳號吧!</p>
                        <button class="hidden" id="register">創建</button>
                    </div>
                </div>
            </div>
        </div>
    
        <script src="script.js"></script>
    <!-- scroll reveal -->
    <script src="https://unpkg.com/scrollreveal"></script>

    <!-- swiper js -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>

    <!-- custom js -->
    <script src="{% static 'js/login.js'%}"></script>
</body>

</html>



</html>
