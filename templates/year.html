<body>
<style>
 
        
 .navbar {
  text-align: center;
}

.navbar-nav {

}

.navbar-brand {
    margin-left: 20px;
    
}

    color: rgb(194, 136, 79);

}

}

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse lshow navbar " style="text-align: center;" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="/index">首頁</a>

                            <a class="nav-link active" aria-current="page" href="/aichat2">AI算命師</a>

                    </ul>
                </div>

        </nav>

        <span style="color: red; font-size: 35px; ">算命結果僅供參考，若有問題請尋求正規管道</span>
    </marquee>
<Section>
    <h2 id="text">流年運勢分析</h2>
    
    <img style="z-index: -1;" src="{%static 'images/year/上圖.png'%}" id="back">
    

    <img src="{%static 'images/year/門1.png'%}" id="door1">
    <img src="{%static 'images/year/門2.png'%}" id="door2">
    <img src="{%static 'images/year/下圖.png'%}" id="cloud">
</Section>
<style>
   
    html {
        font-size: 62.5%;
        overflow-x: hidden;
    }
    body {
    background:  white;
    }
    @media (max-width: 768px) {
    /* CSS rules for screens smaller than 768px */
}

@media (max-width: 576px) {
    /* CSS rules for screens smaller than 576px */
}
div {
        background-size: cover;
        background-position: center;
    }

    @media screen and (max-width: 768px) {
        div {
            background-size: contain;
        }
    }

    
</style>

    
    
<br>
<div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
    <div style="background-image: url(/static/images/year/bg2.jpg); background-repeat: no-repeat; padding: 20px; border-radius: 10px;width: 1515px; height: 1015px;">
        <form id="myform" class="myform"  style="background: linear-gradient(to right, #c9d6ff, #e2e2e2); padding: 50px; border-radius: 10px;width: 900px; height: 900px;">
    {% csrf_token %}
    <h2 style="text-align: center; font-size: 25px;">請輸入出生年月日</h2>
    <label for="name" style="font-size: 25px;">姓名</label>
    <input id="name" name="name" type="text" value="{{user}}" style="font-size: 15px;">
    <label for="date" style="font-size: 25px;">出生年月日</label>
    <input id="date" name="date"  value="{{user_date}}" style="font-size: 15px;">
    <label for="time" style="font-size: 25px;">出生時間</label>
    <input id="time" name="time"  value="{{user_time}}" style="font-size: 15px;">
    
<style>
    label {
    display: block;
    margin-bottom: 8px;
}

           
</style>

            <script>
                //禁止選到後面日子
                const dateInput = document.getElementById('date');
                const today = new Date().toISOString().split('T')[0];
                dateInput.max = today;
            </script>
            
            <label for="" style="font-size: 25px;">性別</label>
            <select id="sex" name="sex" id="genderSelect" style="font-size: 15px;">
                <option value="男">男</option>
                <option value="女">女</option>
            </select>
            
            <a href="/yearfinal/" style="text-decoration: none;">
                <input type="button" value="馬上測" style="font-size: 25px; background-color: #00ff96; color: #fff; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; display: block; margin: 10px auto;" onmouseover="this.style.backgroundColor='red'" onmouseout="this.style.backgroundColor='#00ff96'">
            </a>
            
           
            
            
            <div style="text-align: center;">
                <img src="/static/images//year/7894563.jpg" height="300px" alt="description">
            </div>
        </form>
    </div>
</div>
<!-- footer design -->
<footer class="footer">
    <div class="footer-text">
        <p>Copyright &copy; 2023 |命理GPT.</p>
    </div>

    <div class="footer-iconTop">
        <a href="#home"><i class='bx bx-up-arrow-alt'></i></a>
    </div>
</footer>

</div>



<script src="{% static 'js/year.js'%}"></script>

<script src="https://unpkg.com/scrollreveal"></script>
